[package]
name = "urecs-data-collector"
version = "0.1.0"
edition = "2024"

[dependencies]
bpaf = { version = "0.9.20", features = ["derive", "autocomplete", "bright-color"] }
ctrlc = { version = "3.4.7", features = ["termination"] }
quick-xml = { version = "0.38.0", features = ["serialize"] }
subenum = "1.1.2"
reqwest = { version = "0.12.22", features = ["blocking", "json"] }
anyhow = "1.0.98"
csv = "1.3.1"
serde = { version = "1.0.219", features = ["derive"] }
visa-rs = { version = "0.6.2", optional = true }
pico-sdk = { version = "0.4.0", git = "https://github.com/timfish/pico-sdk.git"}
crossbeam-channel = "0.5.15"

[features]
visa = ["dep:visa-rs"]
