[package]
name = "urecs-data-collector"
version = "0.1.0"
edition = "2024"

[dependencies]
bpaf = { version = "0.9.20", features = ["derive", "autocomplete", "bright-color"] }
ctrlc = { version = "3.4.6", features = ["termination"] }
quick-xml = { version = "0.37.5", features = ["serialize"] }
subenum = "1.1.2"
reqwest = { version = "0.12.15", features = ["blocking"] }
anyhow = "1.0.98"
csv = "1.3.1"
serde = { version = "1.0.219", features = ["derive"] }
